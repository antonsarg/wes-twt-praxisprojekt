info:
  name: Login User
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/login"
  body:
    type: json
    data: |-
      {
        "email": "anton@example.com",
        "password": "securepassword123"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.getStatus() === 200) {
          bru.setVar("jwt_token", res.getBody().token);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
