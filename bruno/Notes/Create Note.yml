info:
  name: Create Note
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/notes"
  body:
    type: json
    data: |-
      {
        "title": "My First Smart Note",
        "content": "This backend is coming together perfectly. Next up: building the dashboard feed!",
        "tags": ["golang", "milestone", "mvp"]
      }
  auth:
    type: bearer
    token: "{{jwt_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
