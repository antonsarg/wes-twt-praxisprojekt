info:
  name: Search Notes
  type: http
  seq: 5

http:
  method: GET
  url: http://localhost:8080/notes/search?q=dashboard
  params:
    - name: q
      value: dashboard
      type: query
  auth:
    type: bearer
    token: "{{jwt_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
