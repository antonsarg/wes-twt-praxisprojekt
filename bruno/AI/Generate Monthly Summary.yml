info:
  name: Generate Monthly Summary
  type: http
  seq: 3

http:
  method: GET
  url: http://localhost:8080/ai/monthly-summary?month=2026-03
  params:
    - name: month
      value: 2026-03
      type: query
  auth:
    type: bearer
    token: "{{jwt_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
